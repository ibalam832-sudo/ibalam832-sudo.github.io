<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>준범에게서 도망쳐라</title>
<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  color:white;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: url("bg.png") no-repeat center center;
  background-size: cover;
}

#warning{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:32px;
  color:red;
  font-weight:bold;
  text-shadow:0 0 10px red;
  z-index:5;
}

#ground{
  position:absolute;
  bottom:150px;
  width:100%;
  height:5px;
  background:#555;
  z-index:2;
}

#player{
  position:absolute;
  bottom:150px;
  left:200px;
  width:150px;
  height:150px;
  background: url("player.png") no-repeat center center;
  background-size: contain;
  z-index:3;
}

#enemy{
  position:absolute;
  bottom:150px;
  left:50px;
  width:160px;
  height:160px;
  background: url("junbeom.png") no-repeat center center;
  background-size: contain;
  z-index:3;
}

.obstacle{
  position:absolute;
  bottom:150px;
  width:140px;
  height:140px;
  background: url("obstacle.png") no-repeat center center;
  background-size: contain;
  z-index:3;
}

#progressBar{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:15px;
  background:#222;
  z-index:4;
}

#progress{height:100%;width:0%;background:#00ff9d;}
</style>
</head>

<body>
<div id="game">
  <div id="progressBar"><div id="progress"></div></div>
  <div id="warning">개폐급(안준범)출현1!!!!11!! ㅆ도망쳐라!!!!</div>
  <div id="ground"></div>
  <div id="player"></div>
  <div id="enemy"></div>
  <audio autoplay loop>
    <source src="bgm.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
let player=document.getElementById("player")
let enemy=document.getElementById("enemy")
let progress=document.getElementById("progress")

let jumping=false
let velocity=0
let gravity=0.8
let y=0

let speed=35
let obstacles=[]
let start=Date.now()
let duration=30000

// 키보드 점프
document.addEventListener("keydown", e=>{
  if((e.code==="Space"||e.code==="ArrowUp")&&!jumping){
    jumping=true
    velocity=20
  }
})

// 모바일 터치 점프
document.addEventListener("touchstart", e=>{
  if(!jumping){
    jumping=true
    velocity=20
  }
})

// 장애물 스폰
function spawnObstacle(){
  let obs=document.createElement("div")
  obs.className="obstacle"
  obs.style.left=window.innerWidth+"px"
  document.getElementById("game").appendChild(obs)
  obstacles.push(obs)

  let nextSpawn = 1800 + Math.random()*400
  setTimeout(spawnObstacle, nextSpawn)
}
spawnObstacle()

function gameLoop(){
  let elapsed=Date.now()-start
  progress.style.width=(elapsed/duration*100)+"%"

  speed += 0.002

  if(jumping){
    y += velocity
    velocity -= gravity
    if(y<=0){ y=0; jumping=false }
  }
  player.style.bottom=(150+y)+"px"

  obstacles.forEach((obs,i)=>{
    let x=parseInt(obs.style.left)
    x -= speed
    obs.style.left=x+"px"

    if(x<-200){ obs.remove(); obstacles.splice(i,1) }

    let px=200
    let py=150+y
    let ox=x
    let oy=150
    if(Math.abs(px-ox)<80 && Math.abs(py-oy)<80){ gameOver() }
  })

  let enemyX=parseInt(enemy.style.left)
  enemyX += speed*0.6
  enemy.style.left = enemyX + "px"
  if(enemyX > 250){ gameOver() }

  if(elapsed > duration){ ending() }

  requestAnimationFrame(gameLoop)
}

function gameOver(){ alert("안준범에게 잡혔다!"); location.reload() }
function ending(){ window.location.href="ending.html" }

gameLoop()
</script>
</body>
</html>
